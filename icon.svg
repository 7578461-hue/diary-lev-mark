<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- background: split blue (Lev) / sage (Mark) -->
  <rect width="180" height="180" rx="36" fill="#2A6B88"/>
  <path d="M180 0 L180 180 L0 180 Z" fill="#5C8B6F"/>
  <!-- subtle diagonal highlight -->
  <path d="M0 0 L180 0 L180 180 Z" fill="white" fill-opacity=".06"/>
  <!-- bottle icon hint, small -->
  <g transform="translate(90 56)" fill="white" fill-opacity=".95">
    <rect x="-9" y="-12" width="18" height="6" rx="2"/>
    <path d="M-11 -6 L-11 18 Q-11 24 -5 24 L5 24 Q11 24 11 18 L11 -6 Z"/>
    <line x1="-7" y1="2" x2="7" y2="2" stroke="#2A6B88" stroke-width="1.4" stroke-opacity=".5"/>
    <line x1="-7" y1="10" x2="7" y2="10" stroke="#5C8B6F" stroke-width="1.4" stroke-opacity=".5"/>
  </g>
  <!-- L & M text -->
  <text x="90" y="140" font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="56" font-weight="700" fill="white" text-anchor="middle"
        letter-spacing="-2">L&amp;M</text>
</svg>
